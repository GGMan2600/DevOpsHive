<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Login page for DevOps Webpage">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Gian Gallego">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="image/favicon.ico" type="x-icon"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />"
    <title>Login Page</title>

</head>
<body>
<em><h1 id="main-header">Welcome to DevOpsHive</h1>
    <section id="main-section">
        <form method="post" onsubmit="newsubmit()" action="main.html">
            <h2 id="login">Login</h2>
        <div id="users">
            <label for="username">Enter Username:</label><br>
            <input type="text" id="username" placeholder="Username"name="username"
            pattern="^[a-zA-Z0-9._%\+ \-]+@[a-zA-Z0-9. \-]+\.[a-z]{2,}$" title="username@dkit.ie">
            <i id="usericon" class="fa-slab-press fa-regular fa-user"></i>
                <br><br>
        </div>
        <div id="passwordicon">
            <label for="password">Enter Password:</label>
            <input type="password" id="password" placeholder="Password"name="password"
             pattern="^[a-zA-Z0-9]{8,}$" title="Must be 8 characters long">
             <i id="pwdicon"class="fa-solid fa-lock"></i>
             <br>
        </div>
             <div id="showingpwd">
             <input type="checkbox" id="showpwd" onclick="showpw()">
             <label for="checkbox" id="pwdcheck">Show Password</label>
             <br><br>
             </div>
            <input type="submit" id="submit"value="submit">
             </form>
        </section>

    </section>

    <script src="java/java.js"></script>

    
</body>
</html>
